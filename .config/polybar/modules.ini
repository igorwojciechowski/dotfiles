[module/menu]
type = custom/menu
label-open = "%{T0} ´Çæ %{T-}"
label-close = "%{T0} ´Çæ %{T-}"
expand-right = true
label-separator = "   "
label-open-foreground = ${colors.green}
label-close-foreground = ${colors.green}

menu-0-0 = ´éï Logout
menu-0-0-exec = i3-msg exit
menu-0-0-foreground = ${colors.green} 

menu-0-1 = ´æ¬ Reboot
menu-0-1-exec = systemctl reboot
menu-0-1-foreground = ${colors.green} 

menu-0-2 = ´Çæ Poweroff
menu-0-2-exec = systemctl poweroff
menu-0-2-foreground = ${colors.green} 

[module/filesystem]
type = internal/fs
mount-0 = /
format-mounted = <label-mounted>
label-mounted =  ´ƒë %percentage_used%% 

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
label =  ´íÜ %percentage%%

[module/memory]
type = internal/memory
interval = 0.5
format = <label>
label =   ´ïø %gb_used%

[module/date]
type = internal/date
date = %d.%m.%Y
label = %date%

[module/time]
type = internal/date
time = %H:%M:%S
label = %time%

[module/i3]
type = internal/i3
format-padding = 1
format = <label-state>
label-focused = " %index% "
label-focused-foreground = ${colors.grey}
label-focused-background = ${colors.yellow}
label-unfocused = " %index% "
label-unfocused-foreground = ${colors.black}
label-unfocused-background = ${colors.grey}


[module/network1]
type = internal/network
interface = eth0
label-connected = " ´ø┐ %local_ip% ´░¡ %downspeed% ´░Â %upspeed% "
label-connected-foreground = ${colors.green}
label-disconnected = " ´ø┐ %local_ip% ´░¡ %downspeed% ´░Â %upspeed% "
label-disconnected-foreground = ${colors.red}


[module/network2]
type = internal/network
interface = eth1
label-connected = " ´ø┐ %local_ip% ´░¡ %downspeed% ´░Â %upspeed% "
label-connected-foreground = ${colors.green}
